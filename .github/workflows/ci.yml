name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Anuluj starsze przebiegi dla tej samej gałęzi (oszczędza minuty CI).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: lint · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22' # ≥ 20.19 wymagane przez Vite 8 (Rolldown)
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run test:run

      - run: npm run build
